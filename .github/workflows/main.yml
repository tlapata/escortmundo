name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x' # Use an LTS version that you require
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build the project
        run: npm run app 

      - name: Deploy to EC2
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          # Prepare SSH agent
          eval "$(ssh-agent -s)"
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -

          # Deploy using rsync
          rsync -avzr --delete ./build/ ec2-user@ec2-13-51-53-216.eu-north-1.compute.amazonaws.com:/escortmundo/

      - name: Restart application (optional)
        run: |
          ssh -i ${{ secrets.SSH_PRIVATE_KEY }} ec2-user@ec2-13-51-53-216.eu-north-1.compute.amazonaws.com "pm2 restart server"

      - name: Clean up
        run: rm -rf node_modules # Optional cleanup step
