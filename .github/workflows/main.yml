name: Deploy on Push

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rsync deployments
        uses: burnett01/rsync-deployments@5.1
        with:
          switches: -avzr --delete
          path: ./*
          remote_path: /escortmundo/ # Ensure this path has the correct permissions
          remote_host: ec2-16-170-187-226.eu-north-1.compute.amazonaws.com
          remote_user: ec2-user
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Clean up
        run: rm -rf node_modules # Clean up to save space if needed